name: Auto-update index.html

on:
  push:
    paths:
      - '*.html'
      - '!index.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install beautifulsoup4 lxml

      - name: Generate index.html and inject session check
        run: python .github/workflows/generate_index.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html *.html
          git diff --staged --quiet || git commit -m "Auto-update index.html + session check [skip ci]"
          git push
