name: Auto-update index.html

on:
  push:
    branches: [ main ]
    paths:
      - '**.html'
      - '!index.html'

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate index.html via Python
        run: |
          python3 << 'PYEOF'
          import os, glob, datetime, json, zoneinfo

          # HTMLファイル収集（index.html / login.html 除く）
          files = sorted([
              f for f in glob.glob("*.html")
              if f not in ("index.html", "login.html")
          ])

          def get_category(name):
              n = name.lower()
              if "minutes" in n or "gijiroku" in n: return "minutes"
              if "benchmark" in n or "research" in n or "strategy" in n: return "strategy"
              if "kickoff" in n or "proposal" in n: return "presentation"
              return "other"

          badge_map = {
              "minutes":      ("badge-minutes",      "議事録"),
              "strategy":     ("badge-strategy",     "分析"),
              "presentation": ("badge-presentation", "資料"),
              "other":        ("badge-other",         "HTML"),
          }
          cat_map = {
              "minutes":      "cat-minutes",
              "strategy":     "cat-strategy",
              "presentation": "cat-presentation",
              "other":        "cat-other",
          }

          jst = zoneinfo.ZoneInfo("Asia/Tokyo")
          updated = datetime.datetime.now(jst).strftime("%Y年%m月%d日 %H:%M JST")
          count   = len(files)

          items_html = ""
          for f in files:
              name = f[:-5]  # .html 除去
              cat  = get_category(name)
              cls, label = badge_map[cat]
              items_html += f"""
                <li class="file-item {cat_map[cat]}">
                  <a class="file-link" href="{f}">
                    <span class="file-badge {cls}">{label}</span>
                    <div class="file-info">
                      <div class="file-name">{name}</div>
                    </div>
                    <span class="file-arrow">&#8594;</span>
                  </a>
                </li>"""

          html = f"""<!DOCTYPE html>
          <html lang="ja">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
          <title>yClinic &#8212; 社内資料一覧</title>
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
          <style>
          :root{{--navy:#0F1F3D;--navy-mid:#1B3160;--accent:#2B5BA8;--gold:#B08D4A;--gold-light:#D4AF70;--bg:#F8F6F1;--bg2:#EEEBE4;--white:#FFFFFF;--text:#1A1A2E;--text-mid:#3D3D5C;--text-muted:#6B6B8A;--border:rgba(15,31,61,0.12);--border-strong:rgba(15,31,61,0.25);}}
          *,*::before,*::after{{box-sizing:border-box;margin:0;padding:0;}}
          body{{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.8;}}
          .lang-bar{{position:sticky;top:0;z-index:100;background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:8px 32px;border-bottom:1px solid rgba(255,255,255,0.08);}}
          .lang-project{{font-size:12px;color:rgba(255,255,255,0.45);letter-spacing:0.08em;}}
          .lang-project strong{{color:var(--gold-light);font-weight:500;}}
          .logout-btn{{padding:5px 14px;font-size:12px;font-weight:500;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.55);border-radius:3px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;letter-spacing:0.04em;transition:all .15s;}}
          .logout-btn:hover{{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.85);}}
          .page{{max-width:920px;margin:0 auto;padding:0 32px 80px;}}
          .cover{{background:var(--navy);color:var(--white);padding:48px 64px 40px;margin:0 -32px 56px;position:relative;overflow:hidden;}}
          .cover::before{{content:'';position:absolute;top:-60px;right:-60px;width:320px;height:320px;border:1px solid rgba(255,255,255,0.05);border-radius:50%;}}
          .cover::after{{content:'';position:absolute;bottom:-40px;right:60px;width:180px;height:180px;border:1px solid rgba(176,141,74,0.18);border-radius:50%;}}
          .cover-eyebrow{{font-size:11px;letter-spacing:0.18em;color:var(--gold-light);text-transform:uppercase;margin-bottom:12px;font-weight:400;position:relative;z-index:1;}}
          .cover-title{{font-family:'DM Serif Display',serif;font-size:52px;line-height:1;letter-spacing:-0.01em;margin-bottom:8px;position:relative;z-index:1;}}
          .cover-title span{{color:var(--gold-light);}}
          .cover-sub{{font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:28px;position:relative;z-index:1;}}
          .cover-meta{{display:flex;gap:36px;flex-wrap:wrap;padding-top:20px;border-top:1px solid rgba(255,255,255,0.1);position:relative;z-index:1;}}
          .cover-meta-label{{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold-light);margin-bottom:2px;}}
          .cover-meta-value{{font-size:13px;color:rgba(255,255,255,0.8);font-weight:300;}}
          .section{{margin-bottom:48px;}}
          .section-num{{font-size:11px;letter-spacing:0.15em;color:var(--gold);text-transform:uppercase;margin-bottom:6px;font-weight:500;}}
          .section-title{{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:700;color:var(--navy);margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid var(--navy);}}
          .file-list{{list-style:none;}}
          .file-item{{background:var(--white);border:1px solid var(--border);margin-bottom:-1px;position:relative;overflow:hidden;}}
          .file-item:first-child{{border-radius:8px 8px 0 0;}}
          .file-item:last-child{{border-radius:0 0 8px 8px;margin-bottom:0;}}
          .file-item:only-child{{border-radius:8px;}}
          .file-item::before{{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:2px 0 0 2px;}}
          .file-item.cat-minutes::before{{background:var(--accent);}}
          .file-item.cat-strategy::before{{background:var(--gold);}}
          .file-item.cat-presentation::before{{background:#2A8A5A;}}
          .file-item.cat-other::before{{background:var(--text-muted);}}
          .file-link{{display:flex;align-items:center;gap:16px;padding:14px 18px 14px 20px;text-decoration:none;color:var(--text);transition:background .12s;}}
          .file-link:hover{{background:#EFF3FA;}}
          .file-link:hover .file-name{{color:var(--navy);}}
          .file-badge{{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 10px;border-radius:3px;flex-shrink:0;}}
          .badge-minutes{{background:rgba(43,91,168,0.1);color:var(--accent);}}
          .badge-strategy{{background:rgba(176,141,74,0.12);color:var(--gold);}}
          .badge-presentation{{background:rgba(42,138,90,0.1);color:#1F7A4A;}}
          .badge-other{{background:var(--bg2);color:var(--text-muted);}}
          .file-info{{flex:1;min-width:0;}}
          .file-name{{font-size:14px;font-weight:500;color:var(--text-mid);line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .12s;}}
          .file-arrow{{font-size:14px;color:var(--border-strong);flex-shrink:0;transition:color .12s,transform .12s;}}
          .file-link:hover .file-arrow{{color:var(--accent);transform:translateX(3px);}}
          </style>
          </head>
          <body>
          <div class="lang-bar">
            <span class="lang-project"><strong>y Clinic</strong> &nbsp;&mdash;&nbsp; 社内資料ポータル</span>
            <button class="logout-btn" onclick="logout()">ログアウト</button>
          </div>
          <div class="page">
            <div class="cover">
              <div class="cover-eyebrow">Future Health by SPIC</div>
              <div class="cover-title">y<span> Clinic</span></div>
              <div class="cover-sub">プロジェクト 社内資料ポータル</div>
              <div class="cover-meta">
                <div><div class="cover-meta-label">資料数</div><div class="cover-meta-value">{count}件</div></div>
                <div><div class="cover-meta-label">自動更新日時</div><div class="cover-meta-value">{updated}</div></div>
                <div><div class="cover-meta-label">プロジェクト</div><div class="cover-meta-value">y Clinic 横浜旗艦 2026</div></div>
              </div>
            </div>
            <div class="section">
              <p class="section-num">Documents</p>
              <h2 class="section-title">資料一覧</h2>
              <ul class="file-list">{items_html if items_html else '<li style="padding:16px;color:var(--text-muted);">資料なし</li>'}</ul>
            </div>
          </div>
          <script>
          if(sessionStorage.getItem('yclinic_auth')!=='1'){{window.location.href='login.html';}}
          function logout(){{sessionStorage.removeItem('yclinic_auth');window.location.href='login.html';}}
          </script>
          </body>
          </html>"""

          with open("index.html", "w", encoding="utf-8") as fp:
              fp.write(html)
          print(f"Generated index.html with {count} files.")
          PYEOF

      - name: Check for changes
        id: check
        run: |
          git diff --quiet index.html && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: auto-update index.html [skip ci]"
          git push origin main
