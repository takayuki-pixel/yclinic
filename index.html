<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<title>y Clinic — 社内資料ポータル</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0F1F3D;--navy-2:#1B3160;--accent:#2B5BA8;
  --gold:#B08D4A;--gold-lt:#D4AF70;
  --bg:#F8F6F1;--bg2:#EEEBE4;--white:#FFFFFF;
  --text:#1A1A2E;--mid:#3D3D5C;--muted:#6B6B8A;
  --border:rgba(15,31,61,0.10);--border-s:rgba(15,31,61,0.22);
  --green:#2A7A50;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.8;-webkit-font-smoothing:antialiased}
.t-zh{display:none}.tb-zh{display:none}
body.lang-zh .t-ja{display:none}body.lang-zh .t-zh{display:inline}
body.lang-zh .tb-ja{display:none}body.lang-zh .tb-zh{display:block}
/* topbar */
.topbar{position:sticky;top:0;z-index:100;background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:8px 32px;border-bottom:1px solid rgba(255,255,255,0.08);gap:12px}
.topbar-left{font-size:12px;color:rgba(255,255,255,0.45);letter-spacing:0.08em}
.topbar-left strong{color:var(--gold-lt);font-weight:500}
.topbar-right{display:flex;align-items:center;gap:8px}
.lang-btns{display:flex;gap:3px}
.lb{padding:4px 12px;font-size:11px;font-weight:500;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.5);border-radius:3px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;letter-spacing:0.04em;transition:all .15s}
.lb:hover{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.85)}
.lb.on{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:700}
.logout-btn{padding:4px 12px;font-size:11px;font-weight:500;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.5);border-radius:3px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;letter-spacing:0.04em;transition:all .15s}
.logout-btn:hover{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.85)}
/* page */
.page{max-width:960px;margin:0 auto;padding:0 32px 80px}
/* cover */
.cover{background:var(--navy);color:var(--white);padding:48px 64px 40px;margin:0 -32px 48px;position:relative;overflow:hidden}
.cover::before{content:'';position:absolute;top:-60px;right:-60px;width:320px;height:320px;border:1px solid rgba(255,255,255,0.05);border-radius:50%}
.cover::after{content:'';position:absolute;bottom:-40px;right:60px;width:180px;height:180px;border:1px solid rgba(176,141,74,0.18);border-radius:50%}
.cover-eyebrow{font-size:11px;letter-spacing:0.18em;color:var(--gold-lt);text-transform:uppercase;margin-bottom:12px;font-weight:400;position:relative;z-index:1}
.cover-title{font-family:'DM Serif Display',serif;font-size:52px;line-height:1;letter-spacing:-0.01em;margin-bottom:8px;position:relative;z-index:1}
.cover-title span{color:var(--gold-lt)}
.cover-sub{font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:28px;position:relative;z-index:1}
.cover-meta{display:flex;gap:36px;flex-wrap:wrap;padding-top:20px;border-top:1px solid rgba(255,255,255,0.1);position:relative;z-index:1}
.cover-meta-label{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold-lt);margin-bottom:2px}
.cover-meta-value{font-size:13px;color:rgba(255,255,255,0.8);font-weight:300}
/* filter */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:32px}
.filter-btn{padding:5px 14px;font-size:11px;font-weight:500;border:1px solid var(--border-s);background:var(--white);color:var(--muted);border-radius:20px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s}
.filter-btn:hover{border-color:var(--navy);color:var(--navy)}
.filter-btn.on{background:var(--navy);color:var(--white);border-color:var(--navy)}
/* section */
.section{margin-bottom:52px}
.section-header{display:flex;align-items:baseline;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--navy)}
.section-num{font-size:11px;letter-spacing:0.15em;color:var(--gold);text-transform:uppercase;font-weight:500}
.section-title{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:700;color:var(--navy)}
/* card grid */
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* doc card */
.doc-card{background:var(--white);border:1px solid var(--border);border-radius:8px;position:relative;overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .15s,transform .12s}
.doc-card:hover{box-shadow:0 4px 20px rgba(15,31,61,0.10);transform:translateY(-1px)}
.doc-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px}
.doc-card.cat-philosophy::before,.doc-card.cat-strategy::before{background:var(--gold)}
.doc-card.cat-minutes::before{background:var(--accent)}
.doc-card.cat-presentation::before{background:var(--green)}
.card-link{display:flex;flex-direction:column;flex:1;padding:18px 20px 16px;text-decoration:none;color:var(--text)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
.card-badge{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 9px;border-radius:3px;flex-shrink:0;margin-top:2px}
.badge-philosophy,.badge-strategy{background:rgba(176,141,74,0.12);color:var(--gold)}
.badge-minutes{background:rgba(43,91,168,0.1);color:var(--accent)}
.badge-presentation{background:rgba(42,138,90,0.1);color:var(--green)}
.card-lang{font-size:9px;letter-spacing:0.06em;color:var(--muted);background:var(--bg2);border:1px solid var(--border-s);border-radius:2px;padding:2px 6px;white-space:nowrap}
.card-title{font-size:14px;font-weight:700;color:var(--navy);line-height:1.5;margin-bottom:8px}
.doc-card:hover .card-title{color:var(--accent)}
.card-desc{font-size:12px;color:var(--muted);line-height:1.75;flex:1;margin-bottom:14px}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border)}
.card-date{font-size:11px;color:var(--muted);letter-spacing:0.04em}
.card-arrow{font-size:13px;color:var(--border-s);transition:color .12s,transform .12s}
.doc-card:hover .card-arrow{color:var(--accent);transform:translateX(3px)}
.empty-msg{grid-column:1/-1;padding:20px;text-align:center;font-size:13px;color:var(--muted);background:var(--bg2);border:1px dashed var(--border-s);border-radius:8px}
@media(max-width:680px){.card-grid{grid-template-columns:1fr}}
@media(max-width:600px){.page{padding:0 16px 60px}.cover{padding:32px 24px 28px}.cover-title{font-size:36px}.cover-meta{flex-direction:column;gap:12px}.topbar{padding:8px 16px}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <strong>y Clinic</strong> &nbsp;—&nbsp;
    <span class="t-ja">社内資料ポータル</span>
    <span class="t-zh">社內資料入口</span>
  </div>
  <div class="topbar-right">
    <div class="lang-btns">
      <button class="lb on" id="btn-ja" onclick="setLang('ja')">日本語</button>
      <button class="lb" id="btn-zh" onclick="setLang('zh')">繁體中文</button>
    </div>
    <button class="logout-btn" onclick="logout()">
      <span class="t-ja">ログアウト</span><span class="t-zh">登出</span>
    </button>
  </div>
</div>

<div class="page">

  <div class="cover">
    <div class="cover-eyebrow">Future Health by SPIC</div>
    <div class="cover-title">y<span> Clinic</span></div>
    <div class="cover-sub">
      <span class="t-ja">プロジェクト 社内資料ポータル</span>
      <span class="t-zh">專案 社內資料入口</span>
    </div>
    <div class="cover-meta">
      <div>
        <div class="cover-meta-label"><span class="t-ja">資料数</span><span class="t-zh">資料數</span></div>
        <div class="cover-meta-value" id="file-count">—</div>
      </div>
      <div>
        <div class="cover-meta-label"><span class="t-ja">更新日</span><span class="t-zh">更新日</span></div>
        <div class="cover-meta-value" id="updated-at">—</div>
      </div>
      <div>
        <div class="cover-meta-label"><span class="t-ja">プロジェクト</span><span class="t-zh">專案</span></div>
        <div class="cover-meta-value">y Clinic 横浜旗艦 2026</div>
      </div>
    </div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn on" id="f-all" onclick="setFilter('all')">
      <span class="t-ja">すべて</span><span class="t-zh">全部</span>
    </button>
    <button class="filter-btn" id="f-philosophy" onclick="setFilter('philosophy')">
      <span class="t-ja">思想・宣言</span><span class="t-zh">思想・宣言</span>
    </button>
    <button class="filter-btn" id="f-strategy" onclick="setFilter('strategy')">
      <span class="t-ja">戦略・分析</span><span class="t-zh">戰略・分析</span>
    </button>
    <button class="filter-btn" id="f-minutes" onclick="setFilter('minutes')">
      <span class="t-ja">議事録</span><span class="t-zh">會議記錄</span>
    </button>
    <button class="filter-btn" id="f-presentation" onclick="setFilter('presentation')">
      <span class="t-ja">計画・提案</span><span class="t-zh">計畫・提案</span>
    </button>
  </div>

  <div class="section" id="sec-philosophy">
    <div class="section-header">
      <p class="section-num">Philosophy</p>
      <h2 class="section-title"><span class="t-ja">思想・宣言・フレームワーク</span><span class="t-zh">思想・宣言・框架</span></h2>
    </div>
    <div class="card-grid" id="list-philosophy"></div>
  </div>

  <div class="section" id="sec-strategy">
    <div class="section-header">
      <p class="section-num">Strategy</p>
      <h2 class="section-title"><span class="t-ja">戦略・分析資料</span><span class="t-zh">戰略・分析資料</span></h2>
    </div>
    <div class="card-grid" id="list-strategy"></div>
  </div>

  <div class="section" id="sec-minutes">
    <div class="section-header">
      <p class="section-num">Minutes</p>
      <h2 class="section-title"><span class="t-ja">議事録</span><span class="t-zh">會議記錄</span></h2>
    </div>
    <div class="card-grid" id="list-minutes"></div>
  </div>

  <div class="section" id="sec-presentation">
    <div class="section-header">
      <p class="section-num">Presentation</p>
      <h2 class="section-title"><span class="t-ja">計画・提案資料</span><span class="t-zh">計畫・提案資料</span></h2>
    </div>
    <div class="card-grid" id="list-presentation"></div>
  </div>

</div>

<script>
if(sessionStorage.getItem('yclinic_auth')!=='1'){window.location.href='login.html';}
function logout(){sessionStorage.removeItem('yclinic_auth');window.location.href='login.html';}

const FILES=[
  {file:'y_clinic_declaration.html',cat:'philosophy',lang:'JA / ZH',date:'2026.04.15',
   title:{ja:'y Clinic — 設立宣言',zh:'y Clinic — 設立宣言'},
   desc:{ja:'鎌倉からの20年の歴史を起点に「なぜこのクリニックをつくるのか」を宣言。行動の正統性・社会的インフラ構想・設立の3旗を収録。日本語／繁體中文対応。',zh:'以鎌倉20年歷史為起點，宣告「為何打造這家診所」。收錄行動正統性、社會基礎建設構想與設立3旗。日文／繁體中文對應。'}},
  {file:'y_clinic_framework.html',cat:'philosophy',lang:'JA / ZH',date:'2026.04.15',
   title:{ja:'y Clinic — フレームワーク',zh:'y Clinic — 框架'},
   desc:{ja:'宣言を実装に変える6層モデル（Entry→Assessment→Interpretation→Intervention→Continuum→Institute）の設計図。世界5施設対応・Absorption Design軸を収録。',zh:'將宣言轉化為實作的6層模型設計圖。收錄與世界5機構的對應及Absorption Design軸。'}},
  {file:'y_clinic_philosophy.html',cat:'philosophy',lang:'JA / ZH',date:'2026.04.15',
   title:{ja:'y Clinic — 思想・宣言・フレームワーク（統合版）',zh:'y Clinic — 思想・宣言・框架（整合版）'},
   desc:{ja:'設立宣言とフレームワークを一冊に統合した資料。ヒーローに使命文・Part I 宣言→Part II 設計図の順で構成。概要把握に最適。',zh:'將設立宣言與框架整合為一冊的資料。以使命文為封面，依照Part I宣言→Part II設計圖順序構成。最適合概覽掌握。'}},
  {file:'y_clinic_deep_research_bilingual.html',cat:'strategy',lang:'JA / ZH',date:'2026.04.14',
   title:{ja:'世界12施設 深層分析（日本語 / 繁體中文）',zh:'全球12診所深度分析（日文 / 繁體中文）'},
   desc:{ja:'Mayo Clinic・Neko Health・Sheba・Chi・Buchinger等12施設を徹底分析。設計哲学・強み・限界・y Clinicへの示唆を施設別に収録。日中バイリンガル版。',zh:'對Mayo Clinic、Neko Health、Sheba、Chi、Buchinger等12家機構進行深度分析。按機構收錄設計哲學、優勢、局限與啟示。日中雙語版。'}},
  {file:'y_clinic_deep_research.html',cat:'strategy',lang:'JA',date:'2026.04.14',
   title:{ja:'世界12施設 深層分析（日本語版）',zh:'全球12診所深度分析（日文版）'},
   desc:{ja:'世界の先端ロンジェビティ・予防医療クリニック12施設の深層分析。施設ごとに理念・診療構造・運営モデル・y Clinicとの差異を詳述。',zh:'對世界頂尖長壽及預防醫療診所12家機構的深度分析。按機構詳述理念、診療結構、運營模型及與y Clinic的差異。'}},
  {file:'y_clinic_global_benchmark.html',cat:'strategy',lang:'JA',date:'2026.04.13',
   title:{ja:'世界クリニック分析 — y Clinic 戦略フレームワーク',zh:'全球診所分析 — y Clinic 戰略框架'},
   desc:{ja:'世界のロンジェビティクリニックを市場・ポジショニング・サービス設計の観点で比較分析。y Clinicの戦略的ポジションと差別化軸を提示した初期分析資料。',zh:'從市場、定位、服務設計角度對比分析世界各地長壽診所。提示y Clinic戰略定位與差異化優勢的初期分析資料。'}},
  {file:'y_clinic_minutes_20260413.html',cat:'minutes',lang:'JA',date:'2026.04.13',
   title:{ja:'第1回 キックオフMTG 議事録',zh:'第1次啟動會議 會議記錄'},
   desc:{ja:'2026年4月13日 横浜スカイビル25F 開催。出席：芝田崇行・柳澤先生・松村先生・Charles・坂端宏治・中西。全体構想・機能設計・標準化・アクションアイテムを収録。',zh:'2026年4月13日 於橫濱Sky Building 25F舉行。出席：芝田崇行、柳澤先生、松村先生、Charles、坂端宏治、中西。收錄整體構想、功能設計、標準化及行動項目。'}},
  {file:'y_clinic_kickoff.html',cat:'presentation',lang:'JA',date:'2026.04.13',
   title:{ja:'y Clinic クリニック事業 キックオフ計画書',zh:'y Clinic 診所事業啟動計畫書'},
   desc:{ja:'横浜スカイビル25F 約80坪・2026年10月開業目標のクリニック事業計画書。医療OS型クリニックの全体像・役割分担・スケジュールを収録。',zh:'橫濱Sky Building 25F 約80坪・以2026年10月開業為目標的診所事業計畫書。收錄醫療OS型診所整體概況、角色分工與時程。'}},
];

const BADGE={
  philosophy:{cls:'badge-philosophy',label:{ja:'思想',zh:'思想'}},
  strategy:{cls:'badge-strategy',label:{ja:'分析',zh:'分析'}},
  minutes:{cls:'badge-minutes',label:{ja:'議事録',zh:'記錄'}},
  presentation:{cls:'badge-presentation',label:{ja:'資料',zh:'資料'}},
};

let lang='ja';
function t(o){return o[lang]||o['ja'];}

function renderAll(){
  ['philosophy','strategy','minutes','presentation'].forEach(sec=>{
    const el=document.getElementById('list-'+sec);
    if(!el)return;
    const items=FILES.filter(f=>f.cat===sec);
    if(!items.length){el.innerHTML=`<div class="empty-msg">${lang==='zh'?'暫無資料':'資料なし'}</div>`;return;}
    const b=BADGE[sec]||BADGE.strategy;
    el.innerHTML=items.map(f=>`
      <div class="doc-card cat-${f.cat}">
        <a class="card-link" href="${f.file}">
          <div class="card-top">
            <span class="card-badge ${b.cls}">${t(b.label)}</span>
            ${f.lang?`<span class="card-lang">${f.lang}</span>`:''}
          </div>
          <div class="card-title">${t(f.title)}</div>
          <div class="card-desc">${t(f.desc)}</div>
          <div class="card-footer">
            <span class="card-date">${f.date}</span>
            <span class="card-arrow">→</span>
          </div>
        </a>
      </div>`).join('');
  });
  document.getElementById('file-count').textContent=FILES.length+(lang==='zh'?'份':'件');
}

let currentFilter='all';
function setFilter(cat){
  currentFilter=cat;
  ['all','philosophy','strategy','minutes','presentation'].forEach(k=>{
    document.getElementById('f-'+k)&&document.getElementById('f-'+k).classList.toggle('on',k===cat);
  });
  ['philosophy','strategy','minutes','presentation'].forEach(sec=>{
    const el=document.getElementById('sec-'+sec);
    if(!el)return;
    el.style.display=(cat==='all'||cat===sec)?'':'none';
  });
}

function setLang(l){
  lang=l;
  document.body.classList.toggle('lang-zh',l==='zh');
  document.documentElement.lang=l==='zh'?'zh-TW':'ja';
  document.getElementById('btn-ja').classList.toggle('on',l==='ja');
  document.getElementById('btn-zh').classList.toggle('on',l==='zh');
  renderAll();
}

renderAll();
document.getElementById('updated-at').textContent=
  new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});
</script>
</body>
</html>
