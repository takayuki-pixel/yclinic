<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<title>yClinic — ログイン</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0F1F3D;
  --navy-mid: #1B3160;
  --accent: #2B5BA8;
  --gold: #B08D4A;
  --gold-light: #D4AF70;
  --bg: #F8F6F1;
  --bg2: #EEEBE4;
  --white: #FFFFFF;
  --text: #1A1A2E;
  --text-mid: #3D3D5C;
  --text-muted: #6B6B8A;
  --border: rgba(15,31,61,0.12);
  --border-strong: rgba(15,31,61,0.25);
  --red: #8B2020;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.8;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}
.lang-bar {
  background: var(--navy);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 32px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  flex-shrink: 0;
}
.lang-project { font-size: 12px; color: rgba(255,255,255,0.45); letter-spacing: 0.08em; }
.lang-project strong { color: var(--gold-light); font-weight: 500; }
.lang-conf { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.25); }
.center-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
}
.login-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 10px;
  width: 100%;
  max-width: 380px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(15,31,61,0.08);
}
.card-header {
  background: var(--navy);
  padding: 28px 28px 24px;
  position: relative;
  overflow: hidden;
}
.card-header::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 160px; height: 160px;
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 50%;
}
.card-header::after {
  content: '';
  position: absolute;
  bottom: -20px; right: 20px;
  width: 80px; height: 80px;
  border: 1px solid rgba(176,141,74,0.18);
  border-radius: 50%;
}
.card-eyebrow {
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--gold-light);
  text-transform: uppercase;
  font-weight: 400;
  margin-bottom: 10px;
  position: relative;
  z-index: 1;
}
.card-title {
  font-family: 'DM Serif Display', serif;
  font-size: 36px;
  line-height: 1;
  letter-spacing: -0.01em;
  color: var(--white);
  margin-bottom: 4px;
  position: relative;
  z-index: 1;
}
.card-title span { color: var(--gold-light); }
.card-sub { font-size: 12px; color: rgba(255,255,255,0.45); position: relative; z-index: 1; }
.card-body { padding: 28px; }
.form-label {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  font-weight: 500;
  display: block;
  margin-bottom: 8px;
}
.form-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border-strong);
  border-radius: 6px;
  padding: 10px 14px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color .15s, box-shadow .15s;
  -webkit-appearance: none;
}
.form-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(43,91,168,0.1);
}
.form-input::placeholder { color: var(--text-muted); }
.form-group { margin-bottom: 20px; }
.login-btn {
  width: 100%;
  background: var(--navy);
  color: var(--white);
  border: none;
  border-radius: 6px;
  padding: 12px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: background .15s;
}
.login-btn:hover { background: var(--navy-mid); }
.login-btn:active { background: var(--gold); color: var(--navy); }
.error-msg {
  font-size: 12px;
  color: var(--red);
  text-align: center;
  margin-top: 12px;
  min-height: 18px;
  opacity: 0;
  transition: opacity .2s;
}
.error-msg.visible { opacity: 1; }
.card-footer {
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding: 12px 28px;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.06em;
  text-align: center;
}
</style>
</head>
<body>

<div class="lang-bar">
  <span class="lang-project"><strong>y Clinic</strong> &nbsp;—&nbsp; 社内資料ポータル</span>
  <span class="lang-conf">Confidential · Internal Use Only</span>
</div>

<div class="center-wrap">
  <div class="login-card">
    <div class="card-header">
      <div class="card-eyebrow">Future Health by SPIC</div>
      <div class="card-title">y<span> Clinic</span></div>
      <div class="card-sub">社内資料ポータル — ログイン</div>
    </div>
    <div class="card-body">
      <div class="form-group">
        <label class="form-label" for="password">パスワード</label>
        <input
          class="form-input"
          type="password"
          id="password"
          placeholder="パスワードを入力"
          autocomplete="current-password"
        >
      </div>
      <button class="login-btn" onclick="doLogin()">ログイン →</button>
      <div class="error-msg" id="error-msg">パスワードが正しくありません</div>
    </div>
    <div class="card-footer">
      y Clinic Project &nbsp;·&nbsp; SPIC Corporation &nbsp;·&nbsp; 2026
    </div>
  </div>
</div>

<script>
  const PASS_HASH = '6a7a37a435033228dc94acef47b93872a944056bab64a76aa90774eba1d6010b';
  const REDIRECT  = 'index.html';

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function doLogin() {
    const val = document.getElementById('password').value;
    if (!val) return;
    const hash = await sha256(val);
    if (hash === PASS_HASH) {
      sessionStorage.setItem('yclinic_auth', '1');
      window.location.href = REDIRECT;
    } else {
      const el = document.getElementById('error-msg');
      el.classList.add('visible');
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
      setTimeout(() => el.classList.remove('visible'), 3000);
    }
  }

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  if (sessionStorage.getItem('yclinic_auth') === '1') {
    window.location.href = REDIRECT;
  }
</script>
</body>
</html>
